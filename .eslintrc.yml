env:
  node: true
  browser: true
  es2021: true
extends:
  - airbnb-base
  - plugin:prettier/recommended
parserOptions:
  ecmaVersion: latest
  sourceType: module
rules:
  prettier/prettier: 0
  no-unused-vars: 1
  no-plusplus: 0
  no-restricted-syntax:
    - error
    - LabeledStatement,
      WithStatement
  lines-between-class-members: 0
