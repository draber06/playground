<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Почта с тегами</title>
    <meta charset='utf-8'>
    <style>
        .Page {
            font-family: Arial;
            font-size: 12px;
            margin: 0;
            padding: 0;
            color: #2f2d33;
        }

        .Logo {
            font-size: 24px;
            padding: 12px;
            margin: 0;
        }

        .Main {
            display: flex;
        }

        .Tags {
            width: 25%;
            background-color: #fffae5;
            padding: 6px;
        }

        .Tags_dropzone {
            background-color: #ffedba;
        }

        .Tags_dragovered {
            background-color: #ffd98e;
        }

        .Tags_dragovered * {
            pointer-events: none;
        }

        .Tag {
            background-color: #ffc062;
            color: #592400;
            margin: 6px;
            padding: 6px;
            display: inline-block;
        }

        .Tag_dragged {
            background-color: #ff9100;
        }

        .Tag_removed {
            display: none;
        }

        .Letters {
            width: 100%;
            background-color: #91cfff;
        }

        .Letters_dropzone {
            background-color: #4da0ff;
        }

        .Letter {
            display: flex;
            color: #00244d;
        }

        .Letter_dragovered {
            background-color: #006fed;
        }

        .Letter_dragovered * {
            pointer-events: none;
        }

        .Letter__Title {
            margin: 12px;
        }
    </style>
</head>

<body class="Page">
<script>
    let data = window.data || {
        tags: {
            '1': 'важное',
            '2': 'личное',
            '3': 'рабочее',
            '4': 'Проект X',
            '5': 'Проект Y'
        },
        letters: [
            {
                id: '1',
                title: 'Приглашение на день рождения',
                tags: ['1', '2']
            },
            {
                id: '2',
                title: 'Ответ на ваш комментарий',
                tags: ['2']
            },
            {
                id: '3',
                title: 'Резюме последней встречи про X',
                tags: ['3', '4']
            },
            {
                id: '4',
                title: 'Расчётный лист',
                tags: ['1', '3']
            },
            {
                id: '5',
                title: 'Нужна помощь с Y',
                tags: ['3', '5']
            },
            {
                id: '6',
                title: 'Регулярная рассылка для клиентов',
                tags: []
            }
        ]
    }

    function mapAndJoin(a, f, s = '') {
        return a.map(f).join(s)
    }

    function buildHtml(data) {
        return `
      <div class="Main">
        <div class="Tags">
          ${mapAndJoin(
            Object.entries(data.tags),
            ([id, title]) => buildTagHtml(id, title))}
        </div>
        <div class="Letters">
          ${mapAndJoin(
            data.letters,
            ({id, title, tags}) => `
              <div class="Letter" data-letter-id="${id}">
                <div class="Letter__Title">${title}</div>
                ${mapAndJoin(tags, (l) => buildTagHtml(l, data.tags[l]))}
              </div>
            `)}
        </div>
      </div>
    `
    }

    function buildTagHtml(id, title) {
        return `<div class="Tag" data-tag-id="${id}" draggable="true">${title}</div>`
    }


    const X_TAG_ID = 'application/x-tag-id'
    const X_LETTER_ID = 'application/x-letter-id'




    document.addEventListener('DOMContentLoaded', () => {
        const tagsDropzone = document.querySelector('.Tags');
        const lettersDropzone = document.querySelector('.Letters');

        [tagsDropzone, lettersDropzone].forEach(dropzone => {
            dropzone.addEventListener('dragstart', (event) => {
                if (event.target.matches('.Tag')) {
                    handleTagDragStart(event)
                }
            })
            dropzone.addEventListener('dragend', (event) => {
                if (event.target.matches('.Tag')) {
                    handleTagDragend(event)
                }
            })
        })

        tagsDropzone.addEventListener('dragenter', handleTagsDropzoneDragEnter)
        tagsDropzone.addEventListener('dragover', handleTagsDropzoneDragOver)
        tagsDropzone.addEventListener('dragleave', handleTagsDropzoneDragLeave)
        tagsDropzone.addEventListener('drop', handleTagsDropzoneDrop)

        lettersDropzone.addEventListener('dragenter', event => {
            if(event.target.matches('.Letter')) {
                handleLetterDragEnter(event)
            }
        })
        lettersDropzone.addEventListener('dragover', event => {
            if(event.target.matches('.Letter')) {
                handleLetterDragOver(event)
            }
        })
        lettersDropzone.addEventListener('dragleave', event => {
            if(event.target.matches('.Letter')) {
                handleLetterDragLeave(event)
            }
        })
        lettersDropzone.addEventListener('drop', event => {
            if(event.target.matches('.Letter')) {
                handleLetterDrop(event)
            }
        })

        function handleTagsDropzoneDragEnter(event) {
            event.preventDefault()
        }

        function handleTagsDropzoneDragOver(event) {
            if (event.dataTransfer.types.includes(X_LETTER_ID)) {
                event.currentTarget.classList.add('Tags_dragovered')
                event.dataTransfer.dropEffect = 'move'
            } else {
                event.dataTransfer.dropEffect = 'copy'
            }

            event.preventDefault()
        }

        function handleTagsDropzoneDragLeave(event) {
            event.currentTarget.classList.remove('Tags_dragovered')
        }

        function handleLetterDragEnter(event) {
            event.preventDefault()
        }

        function handleTagsDropzoneDrop(event) {
            event.preventDefault()

            const tagId = event.dataTransfer.getData(X_TAG_ID)
            const letterId = event.dataTransfer.getData(X_LETTER_ID)
            const letterTag = document.querySelector(`[data-letter-id="${letterId}"] [data-tag-id="${tagId}"]`)
            letterTag?.remove()
        }

        function handleLetterDragOver(event) {
            event.preventDefault()

            const draggedTag = document.querySelector(`.Tag_dragged`)
            if (!draggedTag) return

            const tagId = draggedTag.dataset.tagId
            if (!event.target.querySelector(`[data-tag-id="${tagId}"]`)) {
                event.target.classList.add('Letter_dragovered')
            }
        }

        function handleLetterDragLeave(event) {
            event.target.classList.remove('Letter_dragovered')
        }

        function handleLetterDrop(event) {
            const tagId = event.dataTransfer.getData(X_TAG_ID)
            if (event.target.querySelector(`[data-tag-id="${tagId}"]`)) {
                return
            }

            event.preventDefault()

            const letterId = event.dataTransfer.getData(X_LETTER_ID)
            if (letterId) {
                const letterTag = document.querySelector(`[data-letter-id="${letterId}"] [data-tag-id="${tagId}"]`)
                event.target.appendChild(letterTag)
            } else {
                const tag = tagsDropzone.querySelector(`[data-tag-id="${tagId}"]`)
                if (tag) {
                    const newTag = tag.cloneNode(true)
                    newTag.classList.remove('Tag_dragged')
                    event.target.appendChild(newTag)
                }
            }
        }

        function handleTagDragStart(event) {
            event.dataTransfer.clearData()
            const {tagId} = event.target.dataset
            
            event.dataTransfer.setData(X_TAG_ID, tagId)
            event.target.classList.add('Tag_dragged')
            lettersDropzone.classList.add('Letters_dropzone')

            if (event.target.closest('.Tags')) {
                event.dataTransfer.effectAllowed = 'copy'
            }

            const letterElement = event.target.closest('.Letter')
            if (letterElement) {
                tagsDropzone.classList.add('Tags_dropzone')
                event.dataTransfer.setData(X_LETTER_ID, letterElement.dataset.letterId)
                event.dataTransfer.effectAllowed = 'move'
            }
        }

        function handleTagDragend(event) {
            event.target.classList.remove('Tag_dragged')
            tagsDropzone.classList.remove('Tags_dropzone', 'Tags_dragovered')
            lettersDropzone.classList.remove('Letters_dropzone')
            document.querySelectorAll('.Letter').forEach(letterElement => {
                letterElement.classList.remove('Letter_dragovered')
            })
        }
    })


    document.body.innerHTML = buildHtml(data);
    window.onSolutionReady && window.onSolutionReady();
</script>
</body>
</html>
