<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Новый логотип Яндекс Такси</title>
    <meta charset="UTF-8">
    <style>
        div {
            position: relative;
            overflow: hidden;
            width: 192px;
            height: 192px;
            border-radius: 36px;
            display: flex;
            background-image: linear-gradient(transparent 0%, transparent 50%, black 50%, black 100%), linear-gradient(145deg, #fcdd2e, #fcb600), linear-gradient(to bottom, transparent 0%, transparent 50%, black 50%, black 100%);;
        }

        div:before {
            content: '';
            display: block;
            position: absolute;
            background-color: #f5f4f0;
            left: 0;
            bottom: 0;
            height: 96px;
            width: 96px;
        }

        div:after {
            content: '';
            display: block;
            position: absolute;
            left: 0;
            top: 50%;
            height: 7px;
            width: 96px;
            background: linear-gradient(178deg, rgba(0, 0, 0, 0.18), transparent)
        }


    </style>
    <!--    <link rel="stylesheet" href="solution.css">-->
</head>
<body>
<div></div>
</body>
</html>
